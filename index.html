<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Klickstrecken – Workflows zum Durchklicken</title>
<style>
  :root {
    --bg: #0f1419;
    --bg-2: #171d26;
    --bg-3: #1f2733;
    --line: #2b3543;
    --text: #e6edf3;
    --muted: #8b97a7;
    --accent: #4f9cf4;
    --accent-2: #3b82f6;
    --good: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --radius: 12px;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 80% -10%, #1b2734 0%, var(--bg) 55%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select {
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 14px;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 5px; font-weight: 600; letter-spacing: .02em; }
  .field { margin-bottom: 14px; }

  /* layout */
  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .brand { padding: 18px 18px 14px; border-bottom: 1px solid var(--line); }
  .brand h1 { margin: 0; font-size: 17px; letter-spacing: .2px; display:flex; align-items:center; gap:8px; }
  .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .brand p { margin: 5px 0 0; font-size: 12px; color: var(--muted); }

  .wf-list { flex: 1; overflow-y: auto; padding: 10px; }
  .wf-item {
    padding: 11px 12px; border-radius: 10px; border: 1px solid transparent;
    margin-bottom: 6px; cursor: pointer; transition: .12s;
  }
  .wf-item:hover { background: var(--bg-3); }
  .wf-item.active { background: var(--bg-3); border-color: var(--accent); }
  .wf-item .t { font-size: 14px; font-weight: 600; }
  .wf-item .s { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .sidebar-foot { padding: 12px; border-top: 1px solid var(--line); display: grid; gap: 8px; }

  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    background: rgba(15,20,25,.6); backdrop-filter: blur(6px);
  }
  .topbar h2 { margin: 0; font-size: 16px; flex: 0 1 auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar .grow { flex: 1; }
  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 3px; }
  .seg button {
    border: none; background: transparent; color: var(--muted);
    padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
  }
  .seg button.on { background: var(--accent-2); color: #fff; }

  /* Embed-Modus (chrome-los, z. B. für Confluence-iframe) */
  body.embed .sidebar { display: none; }
  body.embed .app { grid-template-columns: 1fr; }
  body.embed .topbar .seg,
  body.embed #shareBtn,
  body.embed #saveCopyBtn { display: none; }

  /* Teilen-Dialog */
  .share-ov { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center;
    justify-content: center; background: rgba(0,0,0,.55); padding: 20px; }
  .share-box { background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); width: min(640px, 100%); max-height: 90vh; overflow: auto; padding: 22px; }
  .share-box h3 { margin: 0 0 4px; font-size: 17px; }
  .share-box p.hint { color: var(--muted); font-size: 12px; margin: 6px 0 16px; }
  .share-box label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
  .share-box input, .share-box textarea { width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; font-size: 13px;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }
  .share-box textarea { resize: vertical; min-height: 60px; }
  .share-row { display: flex; gap: 8px; align-items: stretch; }
  .share-row input { flex: 1; }
  .share-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* Textvorlage im Durchklick-Modus */
  .play-template { margin-top: 18px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--bg); }
  .play-template .pt-head { display: flex; align-items: center; gap: 8px; padding: 8px 10px 8px 12px;
    border-bottom: 1px solid var(--line); background: var(--bg-3); }
  .play-template .pt-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .4px; text-transform: uppercase; }
  .play-template .grow { flex: 1; }
  .play-template pre { margin: 0; padding: 12px 14px; white-space: pre-wrap; word-break: break-word;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 13px; line-height: 1.55; color: var(--text); }

  /* Flowchart-Ansicht */
  .flow-wrap { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; padding: 0; }
  .flow-wrap > .flow-hint { padding: 14px 18px; margin: 0; }
  .flow-hint { color: var(--muted); font-size: 12px; margin: 0 0 14px; }
  .flow-wrap svg { flex: 1 1 auto; width: 100%; min-height: 0; display: block; padding: 18px; box-sizing: border-box; font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif; }
  .fc-edge { fill: none; stroke: var(--muted); stroke-opacity: .55; stroke-width: 2; }
  .fc-arrow { fill: var(--muted); fill-opacity: .8; }
  .fc-elabel-bg { fill: var(--bg-2); stroke: var(--line); }
  .fc-elabel-tx { fill: var(--muted); font-size: 11px; }
  .fc-node { fill: var(--bg-3); stroke: var(--line); stroke-width: 1.5; transition: stroke .15s, filter .15s; }
  .fc-node-g { cursor: pointer; }
  .fc-node-g:hover .fc-node { stroke: var(--accent); filter: drop-shadow(0 4px 12px rgba(0,0,0,.45)); }
  .fc-node.start { stroke: var(--accent); stroke-width: 2; }
  .fc-node.end { stroke: var(--good); }
  .fc-role { font-size: 9px; letter-spacing: .6px; fill: var(--muted); }
  .fc-role.start { fill: var(--accent); }
  .fc-role.end { fill: var(--good); }
  .fc-title { fill: var(--text); font-size: 12.5px; font-weight: 600; pointer-events: none; }

  /* Flowchart-Editor */
  .flow-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 0;
    padding: 14px 18px; background: var(--bg-2); border-bottom: 1px solid var(--line); }
  .flow-bar .flow-hint { margin: 0; flex: 1 1 240px; }
  .fc-node-g .fc-node { cursor: grab; }
  .fc-node-g.sel .fc-node { stroke: var(--accent); stroke-width: 2.5; }
  .fc-handle { fill: var(--accent); stroke: var(--bg); stroke-width: 2; cursor: crosshair; opacity: .35; transition: opacity .12s; }
  .fc-node-g:hover .fc-handle { opacity: 1; }
  .fc-temp { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-dasharray: 5 4; }
  .fc-elabel.editable { cursor: pointer; }
  .fc-elabel.editable:hover .fc-elabel-bg { stroke: var(--accent); }
  .fc-role { pointer-events: none; }

  /* Inspector-Panel */
  #fcInspector { position: fixed; top: 64px; right: 16px; z-index: 45; width: 312px; max-height: calc(100vh - 84px);
    display: flex; flex-direction: column; background: var(--bg-2); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); }
  #fcInspector .fi-head { display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid var(--line); }
  #fcInspector .fi-x { background: none; border: 0; color: var(--muted); font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
  #fcInspector .fi-x:hover { background: var(--bg-3); color: var(--text); }
  #fcInspector .fi-body { padding: 12px 14px; overflow: auto; }
  #fcInspector label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 5px; }
  #fcInspector label:first-child { margin-top: 0; }
  #fcInspector input, #fcInspector textarea, #fcInspector select { width: 100%; background: var(--bg);
    color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; }
  #fcInspector textarea { resize: vertical; }
  #fcInspector .fi-opt { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  #fcInspector .fi-opt .fi-opt-label { flex: 1 1 40%; }
  #fcInspector .fi-opt .fi-opt-tgt { flex: 1 1 50%; }
  #fcInspector .fi-foot { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 12px 14px; border-top: 1px solid var(--line); }

  .content { flex: 1; overflow-y: auto; padding: 22px; position: relative; }

  /* generic buttons */
  .btn {
    border: 1px solid var(--line); background: var(--bg-3); color: var(--text);
    padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
  .btn.primary:hover { background: var(--accent); }
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { border-color: var(--danger); }
  .btn.sm { padding: 6px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* editor */
  .editor-grid { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 1100px; margin: 0 auto; }
  .node-card {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
  }
  .node-card.is-start { border-color: var(--good); }
  .node-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .node-head .badge {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    background: var(--bg-3); color: var(--muted); white-space: nowrap;
  }
  .node-head .badge.start { background: rgba(52,211,153,.15); color: var(--good); }
  .node-head .badge.end { background: rgba(251,191,36,.15); color: var(--warn); }
  .node-head .grow { flex: 1; }
  .options-block { margin-top: 6px; }
  .option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .option-row .lbl { flex: 1.2; }
  .option-row .arrow { color: var(--muted); flex: 0 0 auto; }
  .option-row .tgt { flex: 1; }
  .option-row .del { flex: 0 0 auto; }
  .hint { font-size: 12px; color: var(--muted); margin: 4px 0 0; }
  .add-node-bar { max-width: 1100px; margin: 0 auto 16px; display: flex; gap: 10px; align-items: center; }

  /* player */
  .player-wrap { max-width: 780px; margin: 0 auto; }
  .breadcrumb { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 18px; font-size: 12.5px; }
  .crumb { background: var(--bg-3); border: 1px solid var(--line); padding: 5px 10px; border-radius: 20px; color: var(--muted); }
  .crumb.current { color: var(--text); border-color: var(--accent); }
  .crumb-sep { color: var(--muted); }
  .play-card {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 16px;
    padding: 30px; box-shadow: var(--shadow);
  }
  .play-card .kicker { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
  .play-card h3 { margin: 8px 0 12px; font-size: 24px; line-height: 1.25; }
  .play-card .body { font-size: 15.5px; line-height: 1.65; color: #cbd5e1; white-space: pre-wrap; }
  .play-options { margin-top: 26px; display: grid; gap: 11px; }
  .play-opt {
    text-align: left; width: 100%; border: 1px solid var(--line); background: var(--bg-3);
    color: var(--text); padding: 15px 18px; border-radius: 12px; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 12px; transition: .12s;
  }
  .play-opt:hover { border-color: var(--accent); background: #243042; transform: translateY(-1px); }
  .play-opt .chev { margin-left: auto; color: var(--muted); }
  .play-end {
    margin-top: 24px; padding: 16px; border-radius: 12px; text-align: center;
    background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.35); color: var(--good); font-weight: 600;
  }
  .play-foot { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; max-width: 460px; margin: 0 auto; }
  .empty svg { opacity: .5; }

  /* toast */
  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-3); border: 1px solid var(--line); color: var(--text);
    padding: 11px 18px; border-radius: 10px; font-size: 13.5px; box-shadow: var(--shadow);
    opacity: 0; pointer-events: none; transition: .25s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4656; }

  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 30; width: 280px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1><span class="dot"></span> Klickstrecken</h1>
      <p>Workflows zum Durchklicken</p>
    </div>
    <div class="wf-list" id="wfList"></div>
    <div class="sidebar-foot">
      <button class="btn primary" id="newWfBtn">+ Neue Klickstrecke</button>
      <div class="btn-row">
        <button class="btn sm" id="importBtn" style="flex:1">Import</button>
        <button class="btn sm" id="exportBtn" style="flex:1">Export</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar" id="topbar" style="display:none">
      <h2 id="wfTitle">–</h2>
      <div class="grow"></div>
      <button class="btn sm" id="saveCopyBtn" style="display:none;margin-right:8px">Als eigene Kopie speichern</button>
      <button class="btn sm" id="shareBtn" style="margin-right:8px" title="Teilen-Link / Confluence-Einbettung">🔗 Teilen</button>
      <div class="seg">
        <button id="tabEdit" class="on">Bearbeiten</button>
        <button id="tabFlow">Flowchart</button>
        <button id="tabPlay">Durchklicken</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  "use strict";

  // ---------- State ----------
  const LS_KEY = "klickstrecken_v1";
  let state = { workflows: [], currentId: null };
  let mode = "edit";              // 'edit' | 'play'
  let play = { nodeId: null, history: [] };
  let sharedMode = false;         // aus URL geladen → localStorage nicht überschreiben
  let embedMode = false;          // chrome-lose Einbettung (Confluence-iframe)
  let flowSel = null;             // im Flowchart ausgewählter Knoten
  const FC = { NW: 196, NH: 66, hGap: 30, vGap: 66, pad: 24 };  // Flowchart-Maße

  // ---------- URL-Sharing (Base64url, UTF-8-sicher) ----------
  function b64urlEncode(str) {
    const bytes = new TextEncoder().encode(str);
    let bin = "";
    bytes.forEach((b) => { bin += String.fromCharCode(b); });
    return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function b64urlDecode(str) {
    let s = str.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    const bin = atob(s);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }
  const encodeWf = (wf) => b64urlEncode(JSON.stringify(wf));
  const decodeWf = (raw) => JSON.parse(b64urlDecode(raw));

  const $ = (sel) => document.querySelector(sel);
  const uid = () => Math.random().toString(36).slice(2, 9);
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function toast(msg) {
    const t = $("#toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove("show"), 1900);
  }

  // ---------- Persistence ----------
  function save() {
    if (sharedMode) return;   // geteilte/eingebettete Ansicht ist read-only fürs lokale Speichern
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch (e) { toast("Speichern fehlgeschlagen"); }
  }
  function load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) { state = JSON.parse(raw); return true; }
    } catch (e) {}
    return false;
  }

  // ---------- Model helpers ----------
  function currentWf() { return state.workflows.find((w) => w.id === state.currentId) || null; }

  function newNode(title, text) {
    return { id: uid(), title: title || "Neuer Schritt", text: text || "", template: "", options: [] };
  }

  function makeWorkflow(name) {
    const start = newNode("Start", "Beschreibe hier den ersten Schritt deines Prozesses.");
    return {
      id: uid(),
      name: name || "Neue Klickstrecke",
      description: "",
      startNodeId: start.id,
      nodes: [start],
      createdAt: Date.now(),
    };
  }

  function sampleWorkflow() {
    const wf = makeWorkflow("Beispiel: Rechnung freigeben");
    wf.description = "Entscheidungshilfe für die Rechnungsfreigabe";
    const start = wf.nodes[0];
    start.title = "Rechnung eingegangen";
    start.text = "Eine neue Eingangsrechnung liegt vor. Liegt eine passende Bestellung im System vor?";

    const noOrder = newNode("Keine Bestellung gefunden", "Es gibt keinen passenden Bestellvorgang.\nKläre mit dem Fachbereich, wer die Bestellung ausgelöst hat.");
    const order   = newNode("Bestellung vorhanden", "Stimmen Betrag und Positionen mit der Bestellung überein?");
    const mismatch = newNode("Abweichung klären", "Betrag/Positionen weichen ab. Rechnung an den Lieferanten zur Korrektur zurücksenden.");
    mismatch.template = "Betreff: Rückfrage zu Ihrer Rechnung Nr. […]\n\nSehr geehrte Damen und Herren,\n\nbei der Prüfung Ihrer Rechnung Nr. […] sind Abweichungen zur Bestellung aufgefallen (Betrag bzw. Positionen).\nBitte senden Sie uns eine korrigierte Rechnung zu.\n\nMit freundlichen Grüßen";
    const ok      = newNode("Sachlich geprüft", "Liegt der Rechnungsbetrag über 5.000 €?");
    const small   = newNode("Freigabe Teamleitung", "Freigabe durch die Teamleitung genügt. Anschließend zur Buchhaltung weiterleiten.");
    const big     = newNode("Freigabe Geschäftsführung", "Ab 5.000 € ist die Freigabe der Geschäftsführung erforderlich.");
    const done    = newNode("✓ Zur Zahlung freigegeben", "Die Rechnung ist freigegeben und kann zur Zahlung an die Buchhaltung gehen.");

    [noOrder, order, mismatch, ok, small, big, done].forEach((n) => wf.nodes.push(n));

    start.options = [
      { label: "Nein, keine Bestellung", targetId: noOrder.id },
      { label: "Ja, Bestellung vorhanden", targetId: order.id },
    ];
    order.options = [
      { label: "Stimmt überein", targetId: ok.id },
      { label: "Weicht ab", targetId: mismatch.id },
    ];
    ok.options = [
      { label: "Unter 5.000 €", targetId: small.id },
      { label: "Über 5.000 €", targetId: big.id },
    ];
    small.options = [{ label: "Freigegeben", targetId: done.id }];
    big.options = [{ label: "Freigegeben", targetId: done.id }];
    return wf;
  }

  // ---------- Rendering: sidebar ----------
  function renderSidebar() {
    const list = $("#wfList");
    if (!state.workflows.length) {
      list.innerHTML = '<div class="hint" style="padding:14px">Noch keine Klickstrecke. Lege links unten eine neue an.</div>';
      return;
    }
    list.innerHTML = state.workflows.map((w) => `
      <div class="wf-item ${w.id === state.currentId ? "active" : ""}" data-id="${w.id}">
        <div class="t">${esc(w.name)}</div>
        <div class="s">${w.nodes.length} Schritt${w.nodes.length === 1 ? "" : "e"}${w.description ? " · " + esc(w.description) : ""}</div>
      </div>`).join("");
    list.querySelectorAll(".wf-item").forEach((el) => {
      el.addEventListener("click", () => selectWf(el.dataset.id));
    });
  }

  // ---------- Rendering: main ----------
  function render() {
    renderSidebar();
    const wf = currentWf();
    const topbar = $("#topbar");
    const content = $("#content");

    if (!wf) {
      topbar.style.display = "none";
      content.innerHTML = `
        <div class="empty">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 3H5a2 2 0 0 0-2 2v4M15 3h4a2 2 0 0 1 2 2v4M9 21H5a2 2 0 0 1-2-2v-4M15 21h4a2 2 0 0 0 2-2v-4"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <h2 style="margin:18px 0 8px">Willkommen bei Klickstrecken</h2>
          <p>Verwandle einen Arbeitsprozess in eine klickbare Strecke: Jeder Schritt stellt eine Frage oder gibt eine Anweisung, jede Antwort führt zum nächsten Schritt – bis zum richtigen Ergebnis.</p>
          <p style="margin-top:18px"><button class="btn primary" id="emptyNew">+ Erste Klickstrecke erstellen</button></p>
        </div>`;
      $("#emptyNew") && $("#emptyNew").addEventListener("click", createWf);
      return;
    }

    topbar.style.display = "flex";
    $("#wfTitle").textContent = wf.name;
    $("#tabEdit").classList.toggle("on", mode === "edit");
    $("#tabFlow").classList.toggle("on", mode === "flow");
    $("#tabPlay").classList.toggle("on", mode === "play");
    $("#saveCopyBtn").style.display = (sharedMode && !embedMode) ? "" : "none";

    if (mode === "edit") renderEditor(wf, content);
    else if (mode === "flow") renderFlow(wf, content);
    else renderPlayer(wf, content);
  }

  // ---------- Editor ----------
  function renderEditor(wf, content) {
    const nodeOptions = (selId) =>
      '<option value="">— Ende (kein Folgeschritt) —</option>' +
      wf.nodes.map((n) => `<option value="${n.id}" ${n.id === selId ? "selected" : ""}>${esc(n.title)}</option>`).join("");

    const cards = wf.nodes.map((n) => {
      const isStart = n.id === wf.startNodeId;
      const isEnd = n.options.length === 0;
      const opts = n.options.map((o, i) => `
        <div class="option-row" data-node="${n.id}" data-idx="${i}">
          <input class="lbl opt-label" value="${esc(o.label)}" placeholder="Antwort / Auswahl" />
          <span class="arrow">→</span>
          <select class="tgt opt-target">${nodeOptions(o.targetId)}</select>
          <button class="btn sm danger del opt-del" title="Option entfernen">✕</button>
        </div>`).join("");
      return `
        <div class="node-card ${isStart ? "is-start" : ""}" data-node="${n.id}">
          <div class="node-head">
            <span class="badge ${isStart ? "start" : ""}">${isStart ? "★ START" : "Schritt"}</span>
            ${isEnd ? '<span class="badge end">Endpunkt</span>' : ""}
            <div class="grow"></div>
            ${!isStart ? `<button class="btn sm ghost set-start" data-node="${n.id}">Als Start setzen</button>` : ""}
            <button class="btn sm danger del-node" data-node="${n.id}">Schritt löschen</button>
          </div>
          <div class="field">
            <label>Titel / Frage</label>
            <input class="node-title" data-node="${n.id}" value="${esc(n.title)}" placeholder="z. B. Liegt eine Bestellung vor?" />
          </div>
          <div class="field">
            <label>Beschreibung / Anweisung</label>
            <textarea class="node-text" data-node="${n.id}" placeholder="Erläuterung, was hier zu tun ist…">${esc(n.text)}</textarea>
          </div>
          <div class="field">
            <label>Textvorlage (optional)</label>
            <textarea class="node-template" data-node="${n.id}" placeholder="Text- oder E-Mail-Baustein zum Kopieren – leer lassen = wird beim Durchklicken ausgeblendet">${esc(n.template)}</textarea>
          </div>
          <div class="options-block">
            <label>Antworten / Wege</label>
            ${opts || '<p class="hint">Keine Antworten – dieser Schritt ist ein Endpunkt.</p>'}
            <button class="btn sm add-opt" data-node="${n.id}" style="margin-top:4px">+ Antwort hinzufügen</button>
          </div>
        </div>`;
    }).join("");

    content.innerHTML = `
      <div class="add-node-bar">
        <div style="flex:1">
          <input id="wfNameEdit" value="${esc(wf.name)}" placeholder="Name der Klickstrecke" />
        </div>
        <button class="btn primary" id="addNodeBtn">+ Schritt</button>
        <button class="btn danger" id="delWfBtn">Klickstrecke löschen</button>
      </div>
      <div class="editor-grid">${cards}</div>`;

    // --- bind editor events ---
    $("#wfNameEdit").addEventListener("input", (e) => { wf.name = e.target.value; $("#wfTitle").textContent = wf.name; renderSidebar(); save(); });
    $("#addNodeBtn").addEventListener("click", () => { wf.nodes.push(newNode()); save(); render(); });
    $("#delWfBtn").addEventListener("click", deleteWf);

    content.querySelectorAll(".node-title").forEach((el) =>
      el.addEventListener("input", (e) => { nodeById(wf, e.target.dataset.node).title = e.target.value; save(); renderSidebar(); }));
    content.querySelectorAll(".node-text").forEach((el) =>
      el.addEventListener("input", (e) => { nodeById(wf, e.target.dataset.node).text = e.target.value; save(); }));
    content.querySelectorAll(".node-template").forEach((el) =>
      el.addEventListener("input", (e) => { nodeById(wf, e.target.dataset.node).template = e.target.value; save(); }));

    content.querySelectorAll(".del-node").forEach((el) =>
      el.addEventListener("click", () => deleteNode(wf, el.dataset.node)));
    content.querySelectorAll(".set-start").forEach((el) =>
      el.addEventListener("click", () => { wf.startNodeId = el.dataset.node; save(); render(); toast("Startschritt gesetzt"); }));
    content.querySelectorAll(".add-opt").forEach((el) =>
      el.addEventListener("click", () => { nodeById(wf, el.dataset.node).options.push({ label: "Antwort", targetId: "" }); save(); render(); }));

    content.querySelectorAll(".option-row").forEach((row) => {
      const node = nodeById(wf, row.dataset.node);
      const idx = +row.dataset.idx;
      row.querySelector(".opt-label").addEventListener("input", (e) => { node.options[idx].label = e.target.value; save(); });
      row.querySelector(".opt-target").addEventListener("change", (e) => { node.options[idx].targetId = e.target.value; save(); render(); });
      row.querySelector(".opt-del").addEventListener("click", () => { node.options.splice(idx, 1); save(); render(); });
    });
  }

  function nodeById(wf, id) { return wf.nodes.find((n) => n.id === id); }

  function deleteNode(wf, id) {
    if (wf.nodes.length === 1) { toast("Mindestens ein Schritt muss bleiben"); return; }
    if (!confirm("Diesen Schritt wirklich löschen?")) return;
    wf.nodes = wf.nodes.filter((n) => n.id !== id);
    wf.nodes.forEach((n) => n.options.forEach((o) => { if (o.targetId === id) o.targetId = ""; }));
    if (wf.startNodeId === id) wf.startNodeId = wf.nodes[0].id;
    save(); render();
  }

  // ---------- Player ----------
  function renderPlayer(wf, content) {
    if (!play.nodeId || !nodeById(wf, play.nodeId)) {
      play.nodeId = wf.startNodeId;
      play.history = [];
    }
    const node = nodeById(wf, play.nodeId);
    if (!node) { content.innerHTML = '<div class="empty">Kein Startschritt gefunden.</div>'; return; }

    const crumbs = play.history.concat([play.nodeId]).map((id, i, arr) => {
      const nd = nodeById(wf, id);
      const label = nd ? nd.title : "?";
      const isCur = i === arr.length - 1;
      return `<span class="crumb ${isCur ? "current" : ""}">${esc(label)}</span>` +
             (isCur ? "" : '<span class="crumb-sep">›</span>');
    }).join("");

    const isEnd = node.options.length === 0;
    const optsHtml = node.options.map((o, i) => `
      <button class="play-opt" data-target="${o.targetId}">
        <span>${esc(o.label) || "Weiter"}</span>
        <span class="chev">→</span>
      </button>`).join("");

    content.innerHTML = `
      <div class="player-wrap">
        <div class="breadcrumb">${crumbs}</div>
        <div class="play-card">
          <div class="kicker">${isEnd ? "Ergebnis" : "Schritt " + (play.history.length + 1)}</div>
          <h3>${esc(node.title)}</h3>
          ${node.text ? `<div class="body">${esc(node.text)}</div>` : ""}
          ${node.template ? `
            <div class="play-template">
              <div class="pt-head">
                <span class="pt-label">Textvorlage</span>
                <div class="grow"></div>
                <button class="btn sm" id="copyTpl">Kopieren</button>
              </div>
              <pre>${esc(node.template)}</pre>
            </div>` : ""}
          ${isEnd
            ? `<div class="play-end">Ende der Strecke erreicht</div>`
            : `<div class="play-options">${optsHtml}</div>`}
        </div>
        <div class="play-foot">
          ${play.history.length ? '<button class="btn" id="playBack">← Zurück</button>' : ""}
          <button class="btn ghost" id="playRestart">⟲ Neu starten</button>
        </div>
      </div>`;

    content.querySelectorAll(".play-opt").forEach((el) =>
      el.addEventListener("click", () => {
        const tgt = el.dataset.target;
        if (!tgt || !nodeById(wf, tgt)) { toast("Dieser Weg führt (noch) zu keinem Schritt"); return; }
        play.history.push(play.nodeId);
        play.nodeId = tgt;
        render();
      }));
    $("#copyTpl") && $("#copyTpl").addEventListener("click", () => copyText(node.template));
    $("#playBack") && $("#playBack").addEventListener("click", () => { play.nodeId = play.history.pop(); render(); });
    $("#playRestart") && $("#playRestart").addEventListener("click", () => { play.nodeId = wf.startNodeId; play.history = []; render(); });
  }

  // ---------- Flowchart ----------
  function wrapTitle(str, maxChars, maxLines) {
    const words = String(str == null ? "—" : str).trim().split(/\s+/);
    const lines = [];
    let cur = "";
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      if (!cur) cur = w;
      else if ((cur + " " + w).length <= maxChars) cur += " " + w;
      else { lines.push(cur); cur = w; if (lines.length === maxLines) break; }
    }
    if (cur && lines.length < maxLines) lines.push(cur);
    const full = words.join(" ");
    const shown = lines.join(" ");
    if (shown.length < full.length) {
      let last = lines[lines.length - 1];
      if (last.length > maxChars - 1) last = last.slice(0, maxChars - 1);
      lines[lines.length - 1] = last + "…";
    }
    return lines.length ? lines : ["—"];
  }

  // Automatisches Layout (BFS ab Start) → Positionen
  function computeAutoLayout(wf) {
    const nodes = wf.nodes, byId = {};
    nodes.forEach((n) => { byId[n.id] = n; });
    const depth = {};
    const startId = (wf.startNodeId && byId[wf.startNodeId]) ? wf.startNodeId : (nodes[0] && nodes[0].id);
    const queue = [];
    if (startId) { depth[startId] = 0; queue.push(startId); }
    while (queue.length) {
      const id = queue.shift();
      byId[id].options.forEach((o) => {
        if (o.targetId && byId[o.targetId] && depth[o.targetId] === undefined) {
          depth[o.targetId] = depth[id] + 1; queue.push(o.targetId);
        }
      });
    }
    let maxD = 0;
    Object.keys(depth).forEach((k) => { if (depth[k] > maxD) maxD = depth[k]; });
    const unreached = nodes.filter((n) => depth[n.id] === undefined);
    if (unreached.length) { maxD += 1; unreached.forEach((n) => { depth[n.id] = maxD; }); }
    const levels = {};
    nodes.forEach((n) => { (levels[depth[n.id]] = levels[depth[n.id]] || []).push(n.id); });
    let maxCount = 1;
    Object.keys(levels).forEach((k) => { if (levels[k].length > maxCount) maxCount = levels[k].length; });
    const spanW = FC.pad * 2 + maxCount * FC.NW + (maxCount - 1) * FC.hGap;
    const pos = {};
    Object.keys(levels).forEach((k) => {
      const ids = levels[k];
      const rowW = ids.length * FC.NW + (ids.length - 1) * FC.hGap;
      const startX = (spanW - rowW) / 2;
      const y = FC.pad + Number(k) * (FC.NH + FC.vGap);
      ids.forEach((id, i) => { pos[id] = { x: startX + i * (FC.NW + FC.hGap), y: y }; });
    });
    return pos;
  }

  // Stellt sicher, dass jeder Knoten x/y hat (Erstanordnung bzw. neue Knoten unten anhängen)
  function ensurePositions(wf) {
    const haveAny = wf.nodes.some((n) => typeof n.x === "number" && typeof n.y === "number");
    if (!haveAny) {
      const pos = computeAutoLayout(wf);
      wf.nodes.forEach((n) => { n.x = pos[n.id].x; n.y = pos[n.id].y; });
    } else {
      let maxY = 0;
      wf.nodes.forEach((n) => { if (typeof n.y === "number") maxY = Math.max(maxY, n.y); });
      wf.nodes.forEach((n) => {
        if (typeof n.x !== "number" || typeof n.y !== "number") {
          maxY += FC.NH + FC.vGap; n.x = FC.pad; n.y = maxY;
        }
      });
    }
    save();
  }

  function renderFlow(wf, content) {
    ensurePositions(wf);
    const editable = !embedMode;
    const NW = FC.NW, NH = FC.NH, pad = FC.pad;
    const byId = {}; wf.nodes.forEach((n) => { byId[n.id] = n; });

    // Bounding-Box aller Knoten (auch bei negativen Positionen) → viewBox umfasst alles
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    wf.nodes.forEach((n) => {
      minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, n.x + NW); maxY = Math.max(maxY, n.y + NH);
    });
    if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 560; maxY = 360; }
    const vbX = minX - pad, vbY = minY - pad;
    const canvasW = Math.max(560, (maxX - minX) + pad * 2);
    const canvasH = Math.max(360, (maxY - minY) + pad * 2);

    const edgeD = (s, t) => {
      const x1 = s.x + NW / 2, y1 = s.y + NH, x2 = t.x + NW / 2, y2 = t.y, my = (y1 + y2) / 2;
      return `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
    };
    const labelXY = (s, t) => ({ x: (s.x + t.x) / 2 + NW / 2, y: (s.y + NH + t.y) / 2 });

    let edgeSvg = "", labelSvg = "";
    wf.nodes.forEach((n) => {
      n.options.forEach((o, idx) => {
        if (!o.targetId || !byId[o.targetId]) return;
        const t = byId[o.targetId];
        edgeSvg += `<path class="fc-edge" data-src="${n.id}" data-tgt="${o.targetId}" marker-end="url(#fcArrow)" d="${edgeD(n, t)}" />`;
        const lab = (o.label || "").trim();
        const txt = lab ? (lab.length > 22 ? lab.slice(0, 21) + "…" : lab) : "(ohne Text)";
        const w = txt.length * 6.3 + 16;
        const lp = labelXY(n, t);
        labelSvg += `<g class="fc-elabel ${editable ? "editable" : ""}" data-node="${n.id}" data-opt="${idx}" transform="translate(${lp.x} ${lp.y})">
          <rect class="fc-elabel-bg" x="${-w / 2}" y="-11" width="${w}" height="22" rx="7" />
          <text class="fc-elabel-tx" x="0" y="4" text-anchor="middle">${esc(txt)}</text></g>`;
      });
    });

    let nodeSvg = "";
    wf.nodes.forEach((n) => {
      const isStart = n.id === wf.startNodeId;
      const isEnd = n.options.filter((o) => o.targetId && byId[o.targetId]).length === 0;
      const cls = isStart ? "start" : (isEnd ? "end" : "");
      const role = isStart ? "START" : (isEnd ? "ENDE" : "");
      const lines = wrapTitle(n.title || "—", 26, 2);
      const titleY = (lines.length === 1 ? NH / 2 + 8 : NH / 2 - 2);
      const spans = lines.map((ln, i) => `<tspan x="${NW / 2}" dy="${i === 0 ? 0 : 15}">${esc(ln)}</tspan>`).join("");
      nodeSvg += `<g class="fc-node-g ${flowSel === n.id ? "sel" : ""}" data-node="${n.id}" transform="translate(${n.x} ${n.y})">
        <rect class="fc-node ${cls}" x="0" y="0" width="${NW}" height="${NH}" rx="12" />
        ${role ? `<text class="fc-role ${cls}" x="12" y="17">${role}</text>` : ""}
        <text class="fc-title" x="${NW / 2}" y="${titleY}" text-anchor="middle">${spans}</text>
        ${editable ? `<circle class="fc-handle" cx="${NW / 2}" cy="${NH}" r="7" />` : ""}
      </g>`;
    });

    content.innerHTML = `
      <div class="flow-wrap" id="flowWrap">
        ${editable ? `<div class="flow-bar">
          <button class="btn sm primary" id="fcAddNode">+ Schritt</button>
          <button class="btn sm" id="fcAuto">Automatisch anordnen</button>
          <span class="flow-hint">Knoten ziehen = verschieben · vom blauen Punkt (●) auf einen anderen Schritt ziehen = neuer Antwortweg (auf leere Fläche = neuer Schritt) · Klick = bearbeiten</span>
        </div>` : `<p class="flow-hint">Diagramm des Ablaufs. Klicke auf einen Schritt, um ihn im Durchklicken-Modus zu öffnen.</p>`}
        <svg id="fcSvg" viewBox="${vbX} ${vbY} ${canvasW} ${canvasH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="fcArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path class="fc-arrow" d="M 0 0 L 10 5 L 0 10 z" />
            </marker>
          </defs>
          <g id="fcEdges">${edgeSvg}</g>
          <g id="fcLabels">${labelSvg}</g>
          <g id="fcNodes">${nodeSvg}</g>
        </svg>
      </div>`;

    const svg = $("#fcSvg");

    if (!editable) {
      content.querySelectorAll(".fc-node-g").forEach((g) =>
        g.addEventListener("click", () => { mode = "play"; play = { nodeId: g.dataset.node, history: [] }; render(); }));
      return;
    }

    // ---- Toolbar ----
    $("#fcAddNode").addEventListener("click", () => {
      const n = newNode();
      let maxY = 0; wf.nodes.forEach((m) => { maxY = Math.max(maxY, m.y); });
      n.x = FC.pad; n.y = maxY + FC.NH + FC.vGap;
      wf.nodes.push(n); flowSel = n.id; save(); render();
    });
    $("#fcAuto").addEventListener("click", () => {
      const pos = computeAutoLayout(wf);
      wf.nodes.forEach((n) => { n.x = pos[n.id].x; n.y = pos[n.id].y; });
      save(); render();
    });

    const clientToSvg = (cx, cy) => {
      const ctm = svg.getScreenCTM();
      if (!ctm || !svg.createSVGPoint) {
        const r = svg.getBoundingClientRect();
        return { x: vbX + (cx - r.left) * (canvasW / r.width), y: vbY + (cy - r.top) * (canvasH / r.height) };
      }
      const pt = svg.createSVGPoint(); pt.x = cx; pt.y = cy;
      const sp = pt.matrixTransform(ctm.inverse());
      return { x: sp.x, y: sp.y };
    };
    const redrawEdges = (nodeId) => {
      svg.querySelectorAll("#fcEdges path").forEach((p) => {
        if (p.dataset.src === nodeId || p.dataset.tgt === nodeId) {
          p.setAttribute("d", edgeD(byId[p.dataset.src], byId[p.dataset.tgt]));
        }
      });
      svg.querySelectorAll("#fcLabels .fc-elabel").forEach((gl) => {
        const s = byId[gl.dataset.node]; const o = s && s.options[Number(gl.dataset.opt)];
        if (!o || !byId[o.targetId]) return;
        if (gl.dataset.node === nodeId || o.targetId === nodeId) {
          const lp = labelXY(s, byId[o.targetId]);
          gl.setAttribute("transform", `translate(${lp.x} ${lp.y})`);
        }
      });
    };

    let drag = null;
    const onMove = (e) => {
      if (!drag) return;
      const p = clientToSvg(e.clientX, e.clientY);
      if (drag.kind === "move") {
        const nx = p.x - drag.dx, ny = p.y - drag.dy;
        if (Math.abs(nx - drag.ox) > 3 || Math.abs(ny - drag.oy) > 3) drag.moved = true;
        byId[drag.id].x = nx; byId[drag.id].y = ny;
        drag.g.setAttribute("transform", `translate(${nx} ${ny})`);
        redrawEdges(drag.id);
      } else if (drag.kind === "link") {
        const my = (drag.from.y + p.y) / 2;
        drag.tmp.setAttribute("d", `M ${drag.from.x} ${drag.from.y} C ${drag.from.x} ${my}, ${p.x} ${my}, ${p.x} ${p.y}`);
      }
    };
    const onUp = (e) => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      if (!drag) return;
      const d = drag; drag = null;
      if (d.kind === "move") {
        if (!d.moved) { flowSel = d.id; render(); }
        else { save(); render(); }
      } else if (d.kind === "link") {
        d.tmp.remove();
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const tg = el && el.closest ? el.closest(".fc-node-g") : null;
        const src = byId[d.id];
        if (tg && tg.dataset.node && tg.dataset.node !== d.id) {
          src.options.push({ label: "Antwort", targetId: tg.dataset.node });
          flowSel = d.id; save(); render(); toast("Antwortweg hinzugefügt");
        } else if (!tg) {
          const p = clientToSvg(e.clientX, e.clientY);
          const n = newNode();
          n.x = Math.max(FC.pad, p.x - NW / 2); n.y = Math.max(FC.pad, p.y);
          wf.nodes.push(n);
          src.options.push({ label: "Antwort", targetId: n.id });
          flowSel = n.id; save(); render(); toast("Neuer Schritt + Antwortweg");
        }
      }
    };

    svg.querySelectorAll(".fc-node-g").forEach((g) => {
      const id = g.dataset.node;
      const handle = g.querySelector(".fc-handle");
      if (handle) handle.addEventListener("pointerdown", (e) => {
        e.stopPropagation(); e.preventDefault();
        const tmp = document.createElementNS("http://www.w3.org/2000/svg", "path");
        tmp.setAttribute("class", "fc-temp");
        tmp.setAttribute("marker-end", "url(#fcArrow)");
        svg.querySelector("#fcEdges").appendChild(tmp);
        drag = { kind: "link", id, from: { x: byId[id].x + NW / 2, y: byId[id].y + NH }, tmp };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      });
      g.addEventListener("pointerdown", (e) => {
        if (e.target.classList.contains("fc-handle")) return;
        e.preventDefault();
        const p = clientToSvg(e.clientX, e.clientY);
        drag = { kind: "move", id, dx: p.x - byId[id].x, dy: p.y - byId[id].y, ox: byId[id].x, oy: byId[id].y, moved: false, g };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      });
    });

    content.querySelectorAll("#fcLabels .fc-elabel.editable").forEach((gl) =>
      gl.addEventListener("click", () => { flowSel = gl.dataset.node; render(); }));

    if (flowSel && byId[flowSel]) openInspector(flowSel);
  }

  // Inspector-Panel zum Bearbeiten eines Knotens im Flowchart
  function openInspector(nodeId) {
    const wf = currentWf(); if (!wf) return;
    const n = wf.nodes.find((x) => x.id === nodeId); if (!n) return;
    const host = $("#flowWrap"); if (!host) return;
    const old = $("#fcInspector"); if (old) old.remove();

    const targetOpts = (sel) => '<option value="">— Ende (kein Folgeschritt) —</option>' +
      wf.nodes.filter((m) => m.id !== n.id).map((m) =>
        `<option value="${m.id}" ${m.id === sel ? "selected" : ""}>${esc(m.title)}</option>`).join("");
    const optRows = n.options.map((o, i) => `
      <div class="fi-opt">
        <input class="fi-opt-label" data-idx="${i}" value="${esc(o.label)}" placeholder="Antwort" />
        <select class="fi-opt-tgt" data-idx="${i}">${targetOpts(o.targetId)}</select>
        <button class="btn sm danger fi-opt-del" data-idx="${i}" title="Antwort entfernen">✕</button>
      </div>`).join("");

    const panel = document.createElement("div");
    panel.id = "fcInspector";
    panel.innerHTML = `
      <div class="fi-head"><strong>Schritt bearbeiten</strong><button class="fi-x" id="fiClose" title="Schließen">✕</button></div>
      <div class="fi-body">
        <label>Titel / Frage</label>
        <input id="fiTitle" value="${esc(n.title)}" />
        <label>Beschreibung / Anweisung</label>
        <textarea id="fiText" rows="3" placeholder="Erläuterung…">${esc(n.text)}</textarea>
        <label>Textvorlage (optional)</label>
        <textarea id="fiTpl" rows="2" placeholder="leer = im Durchklicken ausgeblendet">${esc(n.template)}</textarea>
        <label>Antworten / Wege</label>
        <div id="fiOpts">${optRows || '<p class="hint">Noch keine Antwort. Vom ●-Punkt ziehen oder unten hinzufügen.</p>'}</div>
        <button class="btn sm" id="fiAddOpt" style="margin-top:6px">+ Antwort</button>
      </div>
      <div class="fi-foot">
        ${n.id === wf.startNodeId ? '<span class="badge start">★ Start</span>' : '<button class="btn sm ghost" id="fiSetStart">Als Start</button>'}
        <button class="btn sm" id="fiPlay">▶ Durchklicken</button>
        <button class="btn sm danger" id="fiDel">Löschen</button>
      </div>`;
    host.appendChild(panel);

    $("#fiClose").addEventListener("click", () => { flowSel = null; render(); });
    $("#fiTitle").addEventListener("input", (e) => { n.title = e.target.value; save(); updateNodeTitle(n.id); renderSidebar(); });
    $("#fiText").addEventListener("input", (e) => { n.text = e.target.value; save(); });
    $("#fiTpl").addEventListener("input", (e) => { n.template = e.target.value; save(); });
    $("#fiAddOpt").addEventListener("click", () => { n.options.push({ label: "Antwort", targetId: "" }); save(); render(); });
    panel.querySelectorAll(".fi-opt-label").forEach((el) =>
      el.addEventListener("input", (e) => { n.options[Number(e.target.dataset.idx)].label = e.target.value; save(); updateEdgeLabel(n.id, Number(e.target.dataset.idx)); }));
    panel.querySelectorAll(".fi-opt-tgt").forEach((el) =>
      el.addEventListener("change", (e) => { n.options[Number(e.target.dataset.idx)].targetId = e.target.value; save(); render(); }));
    panel.querySelectorAll(".fi-opt-del").forEach((el) =>
      el.addEventListener("click", (e) => { n.options.splice(Number(e.target.dataset.idx), 1); save(); render(); }));
    $("#fiSetStart") && $("#fiSetStart").addEventListener("click", () => { wf.startNodeId = n.id; save(); render(); });
    $("#fiPlay").addEventListener("click", () => { mode = "play"; play = { nodeId: n.id, history: [] }; flowSel = null; render(); });
    $("#fiDel").addEventListener("click", () => {
      if (wf.nodes.length === 1) { toast("Mindestens ein Schritt muss bleiben"); return; }
      if (!confirm("Diesen Schritt löschen?")) return;
      wf.nodes = wf.nodes.filter((x) => x.id !== n.id);
      wf.nodes.forEach((m) => m.options.forEach((o) => { if (o.targetId === n.id) o.targetId = ""; }));
      if (wf.startNodeId === n.id) wf.startNodeId = wf.nodes[0].id;
      flowSel = null; save(); render();
    });
  }

  // Leichte DOM-Updates beim Tippen (ohne kompletten Re-Render)
  function updateNodeTitle(id) {
    const wf = currentWf(); const n = wf && wf.nodes.find((x) => x.id === id);
    const el = document.querySelector('.fc-node-g[data-node="' + id + '"] .fc-title');
    if (!el || !n) return;
    const lines = wrapTitle(n.title || "—", 26, 2);
    el.setAttribute("y", lines.length === 1 ? FC.NH / 2 + 8 : FC.NH / 2 - 2);
    el.innerHTML = lines.map((ln, i) => `<tspan x="${FC.NW / 2}" dy="${i === 0 ? 0 : 15}">${esc(ln)}</tspan>`).join("");
  }
  function updateEdgeLabel(id, idx) {
    const gl = document.querySelector('#fcLabels .fc-elabel[data-node="' + id + '"][data-opt="' + idx + '"]');
    if (!gl) return;
    const wf = currentWf(); const n = wf && wf.nodes.find((x) => x.id === id); const o = n && n.options[idx];
    if (!o) return;
    const lab = (o.label || "").trim();
    const txt = lab ? (lab.length > 22 ? lab.slice(0, 21) + "…" : lab) : "(ohne Text)";
    const w = txt.length * 6.3 + 16;
    gl.querySelector("text").textContent = txt;
    gl.querySelector("rect").setAttribute("x", -w / 2);
    gl.querySelector("rect").setAttribute("width", w);
  }

  // ---------- Workflow actions ----------
  function selectWf(id) {
    state.currentId = id;
    play = { nodeId: null, history: [] };
    save(); render();
  }
  function createWf() {
    const wf = makeWorkflow();
    state.workflows.push(wf);
    state.currentId = wf.id;
    mode = "edit";
    save(); render();
  }
  function deleteWf() {
    const wf = currentWf();
    if (!wf) return;
    if (!confirm(`Klickstrecke „${wf.name}" wirklich löschen?`)) return;
    state.workflows = state.workflows.filter((w) => w.id !== wf.id);
    state.currentId = state.workflows[0] ? state.workflows[0].id : null;
    save(); render();
  }

  // ---------- Import / Export ----------
  function exportWf() {
    const wf = currentWf();
    if (!wf) { toast("Keine Klickstrecke ausgewählt"); return; }
    const blob = new Blob([JSON.stringify(wf, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (wf.name || "klickstrecke").replace(/[^\w\-]+/g, "_") + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  }
  function importWf(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const wf = JSON.parse(reader.result);
        if (!wf.nodes || !Array.isArray(wf.nodes)) throw new Error("ungültig");
        wf.id = uid();
        if (!wf.name) wf.name = "Importierte Klickstrecke";
        state.workflows.push(wf);
        state.currentId = wf.id;
        mode = "edit";
        save(); render();
        toast("Import erfolgreich");
      } catch (e) { toast("Datei konnte nicht gelesen werden"); }
    };
    reader.readAsText(file);
  }

  // ---------- Teilen / Einbetten ----------
  function baseUrl() { return location.origin + location.pathname; }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => toast("In Zwischenablage kopiert"),
        () => toast("Kopieren nicht möglich"));
    } else { toast("Kopieren nicht möglich – bitte manuell markieren"); }
  }

  function openShare() {
    const wf = currentWf();
    if (!wf) { toast("Keine Klickstrecke ausgewählt"); return; }
    const code = encodeWf(wf);
    const playLink = baseUrl() + "?wf=" + code + "&mode=play";
    const embedLink = baseUrl() + "?wf=" + code + "&embed=1";
    const iframe = '<iframe src="' + embedLink + '" width="100%" height="640" ' +
      'style="border:0;border-radius:12px" loading="lazy"></iframe>';
    const iframeFlow = '<iframe src="' + embedLink + '&mode=flow" width="100%" height="640" ' +
      'style="border:0;border-radius:12px" loading="lazy"></iframe>';

    const ov = document.createElement("div");
    ov.className = "share-ov";
    ov.innerHTML = `
      <div class="share-box">
        <h3>„${esc(wf.name)}" teilen</h3>
        <p class="hint">Der komplette Inhalt steckt im Link – kein Server, keine Anmeldung nötig.</p>

        <label>Direkt-Link (öffnet sofort im Durchklicken-Modus)</label>
        <div class="share-row">
          <input id="shLink" readonly value="${esc(playLink)}" />
          <button class="btn" data-copy="link">Kopieren</button>
        </div>

        <label>In Confluence einbetten – Durchklicken (iframe für HTML-/iframe-Makro)</label>
        <textarea id="shIframe" readonly rows="3">${esc(iframe)}</textarea>
        <div class="share-row" style="margin-top:8px;justify-content:flex-end">
          <button class="btn" data-copy="iframe">iframe kopieren</button>
        </div>

        <label>In Confluence einbetten – Flowchart</label>
        <textarea id="shIframeFlow" readonly rows="3">${esc(iframeFlow)}</textarea>
        <div class="share-row" style="margin-top:8px;justify-content:flex-end">
          <button class="btn" data-copy="iframeFlow">iframe kopieren</button>
        </div>

        <div class="share-foot">
          <button class="btn ghost" data-close>Schließen</button>
        </div>
      </div>`;
    document.body.appendChild(ov);

    const close = () => ov.remove();
    ov.addEventListener("click", (e) => { if (e.target === ov) close(); });
    ov.querySelector("[data-close]").addEventListener("click", close);
    ov.querySelector('[data-copy="link"]').addEventListener("click", () => copyText(playLink));
    ov.querySelector('[data-copy="iframe"]').addEventListener("click", () => copyText(iframe));
    ov.querySelector('[data-copy="iframeFlow"]').addEventListener("click", () => copyText(iframeFlow));
  }

  function saveCopy() {
    const cur = currentWf();
    if (!cur) return;
    const copy = JSON.parse(JSON.stringify(cur));
    copy.id = uid();
    let real;
    try { real = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) { real = null; }
    if (!real || !Array.isArray(real.workflows)) real = { workflows: [], currentId: null };
    real.workflows.push(copy);
    real.currentId = copy.id;
    try { localStorage.setItem(LS_KEY, JSON.stringify(real)); } catch (e) {}
    location.href = baseUrl();   // ohne URL-Parameter neu laden → normale, bearbeitbare Ansicht
  }

  // ---------- Init / global events ----------
  $("#newWfBtn").addEventListener("click", createWf);
  $("#exportBtn").addEventListener("click", exportWf);
  $("#importBtn").addEventListener("click", () => $("#importFile").click());
  $("#importFile").addEventListener("change", (e) => { if (e.target.files[0]) importWf(e.target.files[0]); e.target.value = ""; });
  $("#tabEdit").addEventListener("click", () => { mode = "edit"; render(); });
  $("#tabFlow").addEventListener("click", () => { mode = "flow"; render(); });
  $("#tabPlay").addEventListener("click", () => { mode = "play"; play = { nodeId: null, history: [] }; render(); });
  $("#shareBtn").addEventListener("click", openShare);
  $("#saveCopyBtn").addEventListener("click", saveCopy);

  function bootFromUrl() {
    const p = new URLSearchParams(location.search);
    const raw = p.get("wf");
    if (!raw) return false;
    let wf;
    try { wf = decodeWf(raw); } catch (e) { return false; }
    if (!wf || !Array.isArray(wf.nodes) || !wf.nodes.length) return false;
    wf.id = wf.id || uid();
    sharedMode = true;
    embedMode = p.get("embed") === "1";
    state = { workflows: [wf], currentId: wf.id };
    const m = p.get("mode");
    mode = (m === "play" || m === "flow") ? m : (embedMode ? "play" : "edit");
    if (embedMode) document.body.classList.add("embed");
    return true;
  }

  if (bootFromUrl()) {
    // Geteilte/eingebettete Ansicht – lokalen Speicher unangetastet lassen
  } else if (!load() || !state.workflows.length) {
    state = { workflows: [sampleWorkflow()], currentId: null };
    state.currentId = state.workflows[0].id;
    save();
  }
  render();
})();
</script>
</body>
</html>
